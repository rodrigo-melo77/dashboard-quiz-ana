<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Analytics - Quiz TikTok Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: #FAFAF9;
            color: #000;
            line-height: 1.5;
            padding: 20px;
        }
        
        .header {
            background: #FFF;
            padding: 24px 32px;
            border-radius: 16px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 700;
        }
        
        .filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 10px 20px;
            border: 2px solid #E8E8E7;
            background: #FFF;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .filter-btn:hover {
            border-color: #FF4757;
            transform: translateY(-2px);
        }
        
        .filter-btn.active {
            background: #FF4757;
            color: #FFF;
            border-color: #FF4757;
        }
        
        .refresh-btn {
            padding: 10px 20px;
            background: #000;
            color: #FFF;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .refresh-btn:hover {
            background: #333;
            transform: translateY(-2px);
        }
        
        .last-update {
            font-size: 13px;
            color: #666;
        }
        
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .card {
            background: #FFF;
            padding: 28px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: transform 0.2s;
        }
        
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        
        .card-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }
        
        .card-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .card-value {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .card-change {
            font-size: 13px;
            font-weight: 600;
        }
        
        .card-change.positive { color: #10B981; }
        .card-change.negative { color: #EF4444; }
        
        .chart-card {
            background: #FFF;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            margin-bottom: 24px;
        }
        
        .chart-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 24px;
        }
        
        .two-col {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .funnel-bar {
            margin-bottom: 12px;
        }
        
        .funnel-label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }
        
        .funnel-progress {
            height: 32px;
            background: #F3F4F6;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }
        
        .funnel-fill {
            height: 100%;
            background: linear-gradient(90deg, #FF4757 0%, #FF6B7A 100%);
            transition: width 0.6s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 12px;
            color: #FFF;
            font-weight: 600;
            font-size: 13px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #F9FAFB;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
            color: #666;
            border-bottom: 2px solid #E8E8E7;
        }
        
        td {
            padding: 14px 12px;
            border-bottom: 1px solid #F3F4F6;
            font-size: 14px;
        }
        
        tr:nth-child(even) {
            background: #FAFAFA;
        }
        
        .table-container {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            font-size: 18px;
            color: #666;
        }
        
        .error {
            background: #FEE2E2;
            color: #991B1B;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
        }
        
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .cards-grid {
                grid-template-columns: 1fr;
            }
            
            .two-col {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1>📊 Dashboard Analytics - Quiz TikTok Shop</h1>
        <p class="last-update" id="lastUpdate">Carregando...</p>
    </div>
    <div class="filters">
        <button class="filter-btn" data-period="1" onclick="filterPeriod(1)">Hoje</button>
        <button class="filter-btn" data-period="7" onclick="filterPeriod(7)">7 dias</button>
        <button class="filter-btn active" data-period="30" onclick="filterPeriod(30)">30 dias</button>
        <button class="filter-btn" data-period="0" onclick="filterPeriod(0)">Todo período</button>
        <button class="refresh-btn" onclick="loadData()">🔄 Atualizar</button>
    </div>
</div>

<div id="mainContent">
    <div class="loading">⏳ Carregando dados...</div>
</div>

<script>
// ======================================
// CONFIGURAÇÃO
// ======================================
const SHEET_ID = '1hfVv8PAD1zYGz8DznypiaOjghr4jNH_vUVGpElhWPEs';
const API_KEY = 'AIzaSyAUAaDV9bCsnUT8NUtgl4lqBoGrQQJYRkU';
const RANGE = 'Dados!A:Q';
const SENHA_ACESSO = 'ana2025';

let allData = [];
let currentPeriod = 30;
let charts = {};

// ======================================
// PROTEÇÃO COM SENHA
// ======================================
const senhaDigitada = prompt('🔐 Digite a senha de acesso:');
if (senhaDigitada !== SENHA_ACESSO) {
    alert('❌ Acesso negado!');
    document.body.innerHTML = '<h1 style="text-align:center;margin-top:100px;">Acesso negado</h1>';
    throw new Error('Acesso negado');
}

// ======================================
// CARREGAR DADOS DO GOOGLE SHEETS
// ======================================
async function loadData() {
    try {
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${RANGE}?key=${API_KEY}`;
        const response = await fetch(url);
        
        if (!response.ok) {
            throw new Error('Erro ao carregar dados da planilha');
        }
        
        const data = await response.json();
        
        if (!data.values || data.values.length < 2) {
            document.getElementById('mainContent').innerHTML = '<div class="error">⚠️ Nenhum dado encontrado na planilha</div>';
            return;
        }
        
        // Pula o cabeçalho e trata dados vazios
        allData = data.values.slice(1).map(row => {
            // Preenche array com strings vazias se necessário
            const fullRow = Array(17).fill('').map((_, i) => row[i] || '');
            
            return {
                id: fullRow[0] || 'N/A',
                dataHora: fullRow[1] || '',
                genero: fullRow[2] || '',
                preferencia: fullRow[3] || '',
                estrategia: fullRow[4] || '',
                pagina1: parseInt(fullRow[5]) || 0,
                pagina2: parseInt(fullRow[6]) || 0,
                pagina3: parseInt(fullRow[7]) || 0,
                pagina4: parseInt(fullRow[8]) || 0,
                pagina5: parseInt(fullRow[9]) || 0,
                pagina6: parseInt(fullRow[10]) || 0,
                pagina7: parseInt(fullRow[11]) || 0,
                pagina8: parseInt(fullRow[12]) || 0,
                pagina9: parseInt(fullRow[13]) || 0,
                pagina10: parseInt(fullRow[14]) || 0,
                clickFinal: parseInt(fullRow[15]) || 0,
                tempoTotal: parseInt(fullRow[16]) || 0,
                timestamp: parseDate(fullRow[1])
            };
        }).filter(item => item.id !== 'N/A'); // Remove linhas completamente vazias
        
        document.getElementById('lastUpdate').textContent = `Última atualização: ${new Date().toLocaleString('pt-BR')}`;
        
        renderDashboard();
        
    } catch (error) {
        console.error('Erro:', error);
        document.getElementById('mainContent').innerHTML = `<div class="error">❌ Erro ao carregar dados: ${error.message}</div>`;
    }
}

function parseDate(dateStr) {
    // Formato: "DD/MM HH:mm"
    if (!dateStr || dateStr.trim() === '') return new Date();
    
    try {
        const parts = dateStr.split(' ');
        if (parts.length < 2) return new Date();
        
        const [datePart, timePart] = parts;
        const dateComponents = datePart.split('/');
        const timeComponents = timePart.split(':');
        
        if (dateComponents.length < 2 || timeComponents.length < 2) return new Date();
        
        const [day, month] = dateComponents;
        const [hour, minute] = timeComponents;
        
        const year = new Date().getFullYear();
        return new Date(year, parseInt(month) - 1, parseInt(day), parseInt(hour) || 0, parseInt(minute) || 0);
    } catch (e) {
        return new Date();
    }
}

function filterPeriod(days) {
    currentPeriod = days;
    
    // Atualiza botões ativos
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
        if (parseInt(btn.dataset.period) === days) {
            btn.classList.add('active');
        }
    });
    
    renderDashboard();
}

function getFilteredData() {
    if (currentPeriod === 0) return allData;
    
    const now = new Date();
    const cutoff = new Date(now.getTime() - (currentPeriod * 24 * 60 * 60 * 1000));
    
    return allData.filter(item => item.timestamp >= cutoff);
}

// ======================================
// RENDERIZAR DASHBOARD
// ======================================
function renderDashboard() {
    const data = getFilteredData();
    
    if (data.length === 0) {
        document.getElementById('mainContent').innerHTML = '<div class="error">⚠️ Nenhum dado neste período</div>';
        return;
    }
    
    // Calcular métricas
    const total = data.length;
    const conversoes = data.filter(d => d.clickFinal === 1).length;
    const taxaConversao = total > 0 ? ((conversoes / total) * 100).toFixed(1) : 0;
    const tempoMedio = total > 0 ? Math.round(data.reduce((sum, d) => sum + d.tempoTotal, 0) / total) : 0;
    
    const completaram = data.filter(d => d.pagina10 === 1).length;
    const taxaAbandono = total > 0 ? (((total - completaram) / total) * 100).toFixed(1) : 0;
    
    // HTML do dashboard
    let html = `
    <div class="cards-grid">
        <div class="card">
            <div class="card-icon">👥</div>
            <div class="card-label">Total de Respostas</div>
            <div class="card-value">${total.toLocaleString('pt-BR')}</div>
        </div>
        
        <div class="card">
            <div class="card-icon">🎯</div>
            <div class="card-label">Taxa de Conversão</div>
            <div class="card-value">${taxaConversao}%</div>
            <div class="card-change positive">${conversoes} conversões</div>
        </div>
        
        <div class="card">
            <div class="card-icon">⏱️</div>
            <div class="card-label">Tempo Médio</div>
            <div class="card-value">${tempoMedio}s</div>
        </div>
        
        <div class="card">
            <div class="card-icon">📉</div>
            <div class="card-label">Taxa de Abandono</div>
            <div class="card-value" style="color: ${parseFloat(taxaAbandono) > 50 ? '#EF4444' : '#000'}">${taxaAbandono}%</div>
        </div>
    </div>
    
    <div class="chart-card">
        <h3 class="chart-title">📈 Respostas ao longo do tempo</h3>
        <canvas id="timeChart" height="80"></canvas>
    </div>
    
    <div class="two-col">
        <div class="chart-card">
            <h3 class="chart-title">👤 Distribuição por Gênero</h3>
            <canvas id="genderChart"></canvas>
        </div>
        
        <div class="chart-card">
            <h3 class="chart-title">🎯 Distribuição por Estratégia</h3>
            <canvas id="strategyChart"></canvas>
        </div>
    </div>
    
    <div class="chart-card">
        <h3 class="chart-title">📊 Funil de Conversão (10 Páginas)</h3>
        ${renderFunnel(data)}
    </div>
    
    <div class="chart-card">
        <h3 class="chart-title">📋 Últimas 20 Respostas</h3>
        <div class="table-container">
            ${renderTable(data)}
        </div>
    </div>
    `;
    
    document.getElementById('mainContent').innerHTML = html;
    
    // Renderizar gráficos
    setTimeout(() => {
        renderTimeChart(data);
        renderGenderChart(data);
        renderStrategyChart(data);
    }, 100);
}

function renderFunnel(data) {
    const pages = [
        { name: 'Página 1', key: 'pagina1' },
        { name: 'Página 2', key: 'pagina2' },
        { name: 'Página 3', key: 'pagina3' },
        { name: 'Página 4', key: 'pagina4' },
        { name: 'Página 5', key: 'pagina5' },
        { name: 'Página 6', key: 'pagina6' },
        { name: 'Página 7', key: 'pagina7' },
        { name: 'Página 8', key: 'pagina8' },
        { name: 'Página 9', key: 'pagina9' },
        { name: 'Página 10', key: 'pagina10' }
    ];
    
    const total = data.length;
    
    return pages.map(page => {
        const count = data.filter(d => d[page.key] === 1).length;
        const percent = total > 0 ? ((count / total) * 100).toFixed(1) : 0;
        
        return `
        <div class="funnel-bar">
            <div class="funnel-label">
                <span>${page.name}</span>
                <span>${count} (${percent}%)</span>
            </div>
            <div class="funnel-progress">
                <div class="funnel-fill" style="width: ${percent}%">${percent}%</div>
            </div>
        </div>
        `;
    }).join('');
}

function renderTable(data) {
    const last20 = data.slice(-20).reverse();
    
    return `
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Data/Hora</th>
                <th>Gênero</th>
                <th>Estratégia</th>
                <th>Tempo (s)</th>
            </tr>
        </thead>
        <tbody>
            ${last20.map(d => `
                <tr>
                    <td>${d.id}</td>
                    <td>${d.dataHora}</td>
                    <td>${d.genero}</td>
                    <td>${d.estrategia}</td>
                    <td>${d.tempoTotal}s</td>
                </tr>
            `).join('')}
        </tbody>
    </table>
    `;
}

// ======================================
// GRÁFICOS
// ======================================
function renderTimeChart(data) {
    // Agrupar por dia
    const dayData = {};
    data.forEach(d => {
        const day = d.dataHora.split(' ')[0];
        dayData[day] = (dayData[day] || 0) + 1;
    });
    
    const labels = Object.keys(dayData).sort();
    const values = labels.map(l => dayData[l]);
    
    const ctx = document.getElementById('timeChart');
    if (charts.timeChart) charts.timeChart.destroy();
    
    charts.timeChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Respostas',
                data: values,
                borderColor: '#FF4757',
                backgroundColor: 'rgba(255, 71, 87, 0.1)',
                fill: true,
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false }
            }
        }
    });
}

function renderGenderChart(data) {
    const genderCount = {};
    data.forEach(d => {
        genderCount[d.genero] = (genderCount[d.genero] || 0) + 1;
    });
    
    const ctx = document.getElementById('genderChart');
    if (charts.genderChart) charts.genderChart.destroy();
    
    charts.genderChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: Object.keys(genderCount),
            datasets: [{
                data: Object.values(genderCount),
                backgroundColor: ['#FF4757', '#000', '#999']
            }]
        }
    });
}

function renderStrategyChart(data) {
    const strategyCount = {};
    data.forEach(d => {
        strategyCount[d.estrategia] = (strategyCount[d.estrategia] || 0) + 1;
    });
    
    const ctx = document.getElementById('strategyChart');
    if (charts.strategyChart) charts.strategyChart.destroy();
    
    charts.strategyChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: Object.keys(strategyCount),
            datasets: [{
                label: 'Respostas',
                data: Object.values(strategyCount),
                backgroundColor: '#FF4757'
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            plugins: {
                legend: { display: false }
            }
        }
    });
}

// ======================================
// INICIALIZAR
// ======================================
loadData();

// Auto-refresh a cada 5 minutos
setInterval(loadData, 5 * 60 * 1000);
</script>

</body>
</html>
